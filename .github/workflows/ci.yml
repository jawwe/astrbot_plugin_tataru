name: Plugin CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install validation dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest ruff PyYAML
      - name: Check formatting
        run: ruff format --check main.py scripts tests
      - name: Lint plugin
        run: ruff check main.py scripts tests
      - name: Compile plugin
        run: python -m py_compile main.py
      - name: Validate plugin layout
        run: python scripts/validate_plugin_layout.py
      - name: Run focused tests
        run: pytest -q
