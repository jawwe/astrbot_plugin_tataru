name: Plugin CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install validation dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest ruff PyYAML
      - name: Check formatting
        run: ruff format --check main.py scripts tests
      - name: Lint plugin
        run: ruff check main.py scripts tests
      - name: Compile plugin
        run: python -m py_compile main.py
      - name: Validate plugin layout
        run: python scripts/validate_plugin_layout.py
      - name: Run focused tests
        run: pytest -q
