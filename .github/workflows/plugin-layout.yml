name: Plugin Layout

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install layout validator dependency
        run: python -m pip install PyYAML
      - name: Validate installable plugin layout
        run: python scripts/validate_plugin_layout.py
