name: Plugin Layout

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install layout validator dependency
        run: python -m pip install PyYAML
      - name: Validate installable plugin layout
        run: python scripts/validate_plugin_layout.py
